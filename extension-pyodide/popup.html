<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>PDF to MD</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <header>
    <h1>PDF to MD</h1>
    <p class="tag">Runs 100% locally · No uploads · Your files stay private</p>
  </header>

  <main>
    <div id="info">
      <div class="row"><span class="label">File:</span> <span id="filename">—</span></div>
      <div class="row"><span class="label">Status:</span> <span id="status" aria-live="polite" aria-atomic="true">Loading…</span></div>
    </div>

    <button id="convert" disabled aria-disabled="true">Download as .md</button>
  </main>

  <footer>
    <span>with ❤ by <strong>Trần Quân</strong></span>
  </footer>

  <script type="module" src="popup.js"></script>
</body>
</html>
